<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
أكاديمية مستر السمان | منصة الفيديوهات
</title>

<meta name="theme-color" content="#0d47a1">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<!--=========================
        Logo
==========================-->

<img
src="logo.png"
class="logo"
alt="Academy Logo">

<h1 class="main-title">

أكاديمية مستر السمان

</h1>

<p class="sub-title">

منصة الفيديوهات التعليمية

</p>

<div class="title-line"></div>

<!--=========================
        Banner
==========================-->

<div class="banner">

<img
src="banner.png"
alt="Banner">

</div>

<!--=========================
        Login
==========================-->

<div class="search-box">

<input
type="text"
id="codeInput"
placeholder="كود الطالب"
autocomplete="off">

<input
type="password"
id="passwordInput"
placeholder="الرقم السرى"
autocomplete="off">

<button
id="loginBtn"
class="search-btn">

<i class="fa-solid fa-right-to-bracket"></i>

دخول المنصة

</button>

</div>

<!--=========================
      Student Card
==========================-->

<div
id="studentCard"
class="result-card hidden">

<h2 class="result-title">

<i class="fa-solid fa-user-graduate"></i>

بيانات الطالب

</h2>

<div class="result-row">

<span class="result-label">

<i class="fa-solid fa-user"></i>

الاسم

</span>

<span
id="studentName"
class="result-value"></span>

</div>

<div class="result-row">

<span class="result-label">

<i class="fa-solid fa-school"></i>

الصف

</span>

<span
id="studentGrade"
class="result-value"></span>

</div>

<div class="attendance-btn-box">

<button
id="logoutBtn"
class="attendance-btn">

<i class="fa-solid fa-right-from-bracket"></i>

تسجيل الخروج

</button>

</div>

</div>

<!--=========================
      Videos Card
==========================-->

<div
id="videosCard"
class="result-card hidden">

<h2 class="result-title">

<i class="fa-solid fa-circle-play"></i>

مكتبة الفيديوهات

</h2>

<div
id="videosContainer">

</div>

</div>

<!--=========================
      Video Player
==========================-->

<div
id="playerCard"
class="result-card hidden">

<h2
id="videoTitle"
class="result-title">

عنوان الدرس

</h2>

<div class="video-wrapper">

<iframe
id="videoFrame"
width="100%"
height="420"
src=""
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>

</div>

<div class="attendance-btn-box">

<button
id="prevBtn"
class="attendance-btn">

<i class="fa-solid fa-arrow-right"></i>

الدرس السابق

</button>

</div>

<div class="attendance-btn-box">

<button
id="nextBtn"
class="attendance-btn">

الدرس التالى

<i class="fa-solid fa-arrow-left"></i>

</button>

</div>

<div class="attendance-btn-box">

<button
id="backBtn"
class="back-btn">

<i class="fa-solid fa-arrow-right"></i>

العودة إلى الفيديوهات

</button>

</div>

</div>
<!--====================================
        رسالة خطأ تسجيل الدخول
=====================================-->

<div id="loginError" class="result-card hidden">

    <div class="not-found">

        <i class="fa-solid fa-circle-xmark"></i>

        <h2>

            كود الطالب أو الرقم السرى غير صحيح

        </h2>

    </div>

</div>

<!--====================================
            Footer
=====================================-->

<footer class="footer">

    <h3>

        أكاديمية مستر السمان

    </h3>

    <p>

        منصة الفيديوهات التعليمية

    </p>

    <a

        href="https://www.facebook.com/profile.php?id=100093795507056"

        target="_blank"

        class="facebook-btn">

        <i class="fa-brands fa-facebook-f"></i>

        صفحة الأكاديمية على فيسبوك

    </a>

    <p class="copyright">

        © جميع الحقوق محفوظة 2026

    </p>

</footer>

</div>

<!--====================================
            JavaScript
=====================================-->

<script src="script.js"></script>

</body>

</html>
